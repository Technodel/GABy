<!DOCTYPE html>
<html>
<body style="background: #eef2f6; display: flex; gap: 40px; padding: 50px; flex-wrap: wrap;">

<!-- Variant 1: Scale 1.2 -->
<div style="text-align: center;">
  <h3>Scale 1.2</h3>
  <div style="
    width: 440px; height: 440px; border-radius: 50%; background: #000;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    box-shadow: 0 0 100px rgba(255, 170, 0, 0.4); border: 1px solid rgba(255,180,50,0.2);
  ">
    <img src="public/SUNy.png" style="width: 100%; height: 100%; object-fit: contain; transform: scale(1.2);" />
  </div>
</div>
